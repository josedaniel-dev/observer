name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Python ──────────────────────────────────────────────────────────

  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install ruff
      - run: ruff check backend/ cli/ sdk/python/

  python-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install mypy
      - run: mypy backend/app/ cli/cli/ sdk/python/src/

  python-test:
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend deps
        run: pip install -e "backend/[sqlite]"
        working-directory: .
      - name: Install CLI
        run: pip install -e cli/
        working-directory: .
      - name: Install SDK
        run: pip install -e sdk/python/
        working-directory: .
      - name: Backend tests
        run: pytest -x -q --tb=short
        working-directory: backend
      - name: CLI tests
        run: pytest -x -q --tb=short
        working-directory: cli
      - name: SDK tests
        run: pytest -x -q --tb=short
        working-directory: sdk/python

  # ── TypeScript ───────────────────────────────────────────────────────

  typescript-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: SDK lint
        run: npm ci && npm run lint
        working-directory: sdk/typescript
      - name: Dashboard lint
        run: npm ci && npm run lint
        working-directory: dashboard

  typescript-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: SDK typecheck
        run: npm ci && npx tsc --noEmit
        working-directory: sdk/typescript
      - name: Dashboard typecheck
        run: npm ci && npx tsc --noEmit
        working-directory: dashboard

  typescript-test:
    runs-on: ubuntu-latest
    needs: typescript-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: SDK tests
        run: npm ci && npm run test:run
        working-directory: sdk/typescript
      - name: Dashboard build
        run: npm ci && npm run build
        working-directory: dashboard
